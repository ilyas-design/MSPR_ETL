# SonarQube project configuration — HealthAI Coach (MSPR TPRE601)
# Run with: ./infra/scripts/sonar-scan.sh   (local SonarQube on :9002)
sonar.projectKey=healthai-coach
sonar.projectName=HealthAI Coach
sonar.projectVersion=1.0

# --- Sources & tests -------------------------------------------------------
sonar.sources=etl/Pipelines,services/backend/api,services/nutrition-api/app,services/reco-engine,apps/frontend-admin/src,apps/frontend-user/src,apps/mobile/src
sonar.tests=etl/tests,services/backend/api/tests.py,services/nutrition-api/tests,services/reco-engine/tests

# --- Encoding / SCM --------------------------------------------------------
sonar.sourceEncoding=UTF-8
sonar.scm.disabled=true

# --- Language settings -----------------------------------------------------
sonar.python.version=3.12

# Coverage reports (generated by run_coverage.sh / CI). Paths are optional:
# Sonar simply skips a report that is not present.
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=apps/frontend-user/coverage/lcov.info

# --- Exclusions ------------------------------------------------------------
sonar.exclusions=**/node_modules/**,**/dist/**,**/__pycache__/**,**/migrations/**,**/*.min.js,htmlcov/**,**/.venv/**,reports/**
sonar.coverage.exclusions=**/tests/**,**/*test*.py,**/conftest.py,**/migrations/**,**/settings.py,**/manage.py
sonar.cpd.exclusions=**/migrations/**
