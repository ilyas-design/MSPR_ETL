x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  image: ${AIRFLOW_IMAGE_NAME:-mspr-airflow:latest}
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Europe/Paris
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-mspr_airflow_dev_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config
    - ./:/opt/airflow/project
    - sqlite_data:/data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    airflow-permissions:
      condition: service_completed_successfully
    airflow-postgres:
      condition: service_healthy

services:
  etl:
    build:
      context: .
      dockerfile: Dockerfile.etl
    volumes:
      - sqlite_data:/data
    restart: "no"

  app-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: healthai
      POSTGRES_USER: healthai
      POSTGRES_PASSWORD: healthai
    volumes:
      - app_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "healthai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-healthai}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-healthai}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh \"mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD@localhost:27017/admin\" --eval \"db.adminCommand('ping').ok\" --quiet",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  nutrition-api:
    build:
      context: ./nutrition-api
    volumes:
      - sqlite_data:/data
    environment:
      - NUTRITION_API_DB_PATH=/data/mspr_etl.db
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-oss-120b:free}
    expose:
      - "8001"
    depends_on:
      etl:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  reco-engine:
    build:
      context: ./reco-engine
    volumes:
      - sqlite_data:/data
    environment:
      - RECO_ENGINE_DB_PATH=/data/mspr_etl.db
      - MONGO_HOST=mongo
      - MONGO_USER=${MONGO_ROOT_USER:-healthai}
      - MONGO_PASSWORD=${MONGO_ROOT_PASSWORD:-healthai}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-healthai_plans}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-oss-120b:free}
    expose:
      - "8002"
    depends_on:
      etl:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    volumes:
      - sqlite_data:/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-changeme-in-production}
      - DEBUG=${DEBUG:-False}
      - DB_PATH=/data/mspr_etl.db
      - POSTGRES_HOST=app-postgres
      - POSTGRES_DB=healthai
      - POSTGRES_USER=healthai
      - POSTGRES_PASSWORD=healthai
      - NUTRITION_API_URL=http://nutrition-api:8001
      - RECO_ENGINE_URL=http://reco-engine:8002
      - MONGO_HOST=mongo
      - MONGO_USER=${MONGO_ROOT_USER:-healthai}
      - MONGO_PASSWORD=${MONGO_ROOT_PASSWORD:-healthai}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-healthai_plans}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/schema/')",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    depends_on:
      etl:
        condition: service_completed_successfully
      app-postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      reco-engine:
        condition: service_healthy
      nutrition-api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  frontend-user:
    build:
      context: ./frontend-user
    ports:
      - "81:80"
    depends_on:
      backend:
        condition: service_healthy

  airflow-permissions:
    image: busybox:1.36
    command: >
      sh -c "mkdir -p /data/reports /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins /opt/airflow/config
      && chmod -R 777 /data /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins /opt/airflow/config"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - sqlite_data:/data
    restart: "no"

  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME:-airflow}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD:-airflow}" \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email airflow@example.com || true
    restart: "no"

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
    restart: unless-stopped

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
  airflow_postgres_data:
  app_postgres_data:
  mongo_data:
