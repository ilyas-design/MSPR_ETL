name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Tests unitaires + couverture (ETL Python + Django REST API)
  # ---------------------------------------------------------------------------
  tests-coverage:
    name: Tests & coverage (Python 3.12)
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-dummy-secret-key-insecure-do-not-use
      DEBUG: "True"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r backend/requirements.txt
          pip install coverage

      - name: Run ETL unit tests under coverage
        run: python -m coverage run -m unittest discover -s tests -v

      - name: Run Django API tests under coverage
        working-directory: backend
        run: python -m coverage run --append manage.py test -v 2

      - name: Combined coverage report (fail if < 100%)
        run: python -m coverage report

      - name: Generate HTML coverage
        if: always()
        run: python -m coverage html

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 2. Smoke test end-to-end : exécution réelle du pipeline + monitoring
  # ---------------------------------------------------------------------------
  etl-smoke:
    name: ETL pipeline + monitoring (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ETL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL pipeline
        run: python run_pipeline.py

      - name: Run monitoring (fail on WARNING / CRITICAL)
        run: python run_monitoring.py --fail-on-warning

      - name: Verify etl_run tracking
        run: |
          python - <<'PY'
          import sqlite3, sys
          con = sqlite3.connect("mspr_etl.db")
          rows = list(con.execute(
              "SELECT run_id, status, total_rows FROM etl_run "
              "ORDER BY run_id DESC LIMIT 1"
          ))
          assert rows, "etl_run is empty after pipeline run"
          run_id, status, total_rows = rows[0]
          print(f"Last run: id={run_id}, status={status}, total_rows={total_rows}")
          assert status in ("SUCCESS", "WARNING"), f"unexpected status {status}"
          assert total_rows > 0, "no rows loaded"
          PY

      - name: Upload ETL reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etl-reports
          path: |
            reports/
            mspr_etl.db
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 3. Build du frontend (Vite / React)
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend build (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 14
