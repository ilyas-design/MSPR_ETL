name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Tests unitaires + couverture (ETL, Django, nutrition-api, reco-engine)
  # ---------------------------------------------------------------------------
  tests-coverage:
    name: Tests & coverage (Python 3.12)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: healthai
          POSTGRES_PASSWORD: healthai
          POSTGRES_DB: healthai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-dummy-secret-key-insecure-do-not-use
      DEBUG: "True"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: healthai
      POSTGRES_USER: healthai
      POSTGRES_PASSWORD: healthai
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            backend/requirements.txt
            nutrition-api/requirements.txt
            reco-engine/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r backend/requirements.txt
          pip install -r nutrition-api/requirements.txt
          pip install -r reco-engine/requirements.txt
          pip install coverage

      - name: Run ETL unit tests under coverage
        run: python -m coverage run --rcfile=.coveragerc -m unittest discover -s tests -v

      - name: Run Django API tests under coverage
        working-directory: backend
        run: python -m coverage run --append --rcfile=../.coveragerc manage.py test -v 2

      - name: Run nutrition-api tests under coverage
        working-directory: nutrition-api
        run: python -m coverage run --append --rcfile=../.coveragerc --source=app -m pytest -v

      - name: Run reco-engine tests under coverage
        working-directory: reco-engine
        run: python -m coverage run --append --rcfile=../.coveragerc --source=scoring,main,mongo,seed,llm,models -m pytest -v

      - name: Combined coverage report (fail if < 70%)
        run: python -m coverage report --rcfile=.coveragerc

      - name: Generate HTML coverage
        if: always()
        run: python -m coverage html --rcfile=.coveragerc

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 2. Smoke test end-to-end : exécution réelle du pipeline + monitoring
  # ---------------------------------------------------------------------------
  etl-smoke:
    name: ETL pipeline + monitoring (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ETL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL pipeline
        run: python run_pipeline.py

      - name: Run monitoring (fail on WARNING / CRITICAL)
        run: python run_monitoring.py --fail-on-warning

      - name: Verify etl_run tracking
        run: |
          python - <<'PY'
          import sqlite3, sys
          con = sqlite3.connect("mspr_etl.db")
          rows = list(con.execute(
              "SELECT run_id, status, total_rows FROM etl_run "
              "ORDER BY run_id DESC LIMIT 1"
          ))
          assert rows, "etl_run is empty after pipeline run"
          run_id, status, total_rows = rows[0]
          print(f"Last run: id={run_id}, status={status}, total_rows={total_rows}")
          assert status in ("SUCCESS", "WARNING"), f"unexpected status {status}"
          assert total_rows > 0, "no rows loaded"
          PY

      - name: Upload ETL reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etl-reports
          path: |
            reports/
            mspr_etl.db
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 3. Build du frontend admin (Vite / React)
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend build (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 4. Frontend utilisateur MSPR2 — lint, build, tests
  # ---------------------------------------------------------------------------
  frontend-user:
    name: Frontend-user (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-user
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-user/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-user-dist
          path: frontend-user/dist/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 5. Microservices MSPR2 — pytest (nutrition-api, reco-engine)
  # ---------------------------------------------------------------------------
  mspr2-services:
    name: MSPR2 services pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            nutrition-api/requirements.txt
            reco-engine/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r nutrition-api/requirements.txt
          pip install -r reco-engine/requirements.txt

      - name: nutrition-api pytest
        working-directory: nutrition-api
        run: pytest -v

      - name: reco-engine pytest
        working-directory: reco-engine
        run: pytest -v
