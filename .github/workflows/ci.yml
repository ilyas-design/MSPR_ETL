name: CI

on:
  push:
    branches: [main, app]
  pull_request:
    branches: [main, app]
  schedule:
    # Weekly: ML dependency audit + full Docker image scans
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: write

env:
  PIP_CACHE_PATHS: |
    etl/requirements.txt
    services/backend/requirements.txt
    services/nutrition-api/requirements.txt
    services/reco-engine/requirements.txt

jobs:
  # ===========================================================================
  # Stage 1 — Security gates (fast, fail early)
  # ===========================================================================

  dependency-audit:
    name: "1 · Dependency audit (pip + npm)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ env.PIP_CACHE_PATHS }}

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: pip-audit — ETL
        run: pip-audit -r etl/requirements.txt

      - name: pip-audit — backend
        run: pip-audit -r services/backend/requirements.txt

      - name: pip-audit — reco-engine
        run: pip-audit -r services/reco-engine/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/frontend-admin/package-lock.json
            apps/frontend-user/package-lock.json

      - name: npm audit — frontend-admin
        working-directory: apps/frontend-admin
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high

      - name: npm audit — frontend-user
        working-directory: apps/frontend-user
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high

  python-sast:
    name: "1 · Python SAST (Bandit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ env.PIP_CACHE_PATHS }}

      - name: Install Bandit
        run: pip install "bandit[toml]"

      - name: Run Bandit
        run: |
          bandit -r etl/Pipelines services/backend services/nutrition-api services/reco-engine orchestration/airflow \
            -x '*/tests/*,*test*.py,*/migrations/*,*/.pytest_cache/*' \
            -lll \
            -f json -o bandit-report.json || true
          bandit -r etl/Pipelines services/backend services/nutrition-api services/reco-engine orchestration/airflow \
            -x '*/tests/*,*test*.py,*/migrations/*,*/.pytest_cache/*' \
            -lll

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14

  trivy-fs:
    name: "1 · Trivy filesystem scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/cache-trivy

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
          skip-dirs: node_modules,htmlcov,.pytest_cache,orchestration/airflow/logs,apps/frontend-admin/dist,apps/frontend-user/dist,.git,services/nutrition-api
          skip-files: docker-compose.yml,.env.example
      - name: Upload Trivy FS SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-fs.sarif
          skip-dirs: node_modules,htmlcov,.pytest_cache,orchestration/airflow/logs,apps/frontend-admin/dist,apps/frontend-user/dist,.git,services/nutrition-api
          skip-files: docker-compose.yml,.env.example
      - name: Publish Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  # ===========================================================================
  # Stage 2 — Tests & builds (after security gates pass)
  # ===========================================================================

  tests-coverage:
    name: "2 · Tests & coverage (Python 3.12)"
    needs: [dependency-audit, python-sast, trivy-fs]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: healthai
          POSTGRES_PASSWORD: healthai
          POSTGRES_DB: healthai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-dummy-secret-key-insecure-do-not-use
      DEBUG: "True"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: healthai
      POSTGRES_USER: healthai
      POSTGRES_PASSWORD: healthai
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ env.PIP_CACHE_PATHS }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r etl/requirements.txt
          pip install -r services/backend/requirements.txt
          pip install -r services/nutrition-api/requirements.txt
          pip install -r services/reco-engine/requirements.txt
          pip install coverage

      - name: Cache pytest
        uses: actions/cache@v4
        with:
          path: |
            services/nutrition-api/.pytest_cache
            services/reco-engine/.pytest_cache
          key: pytest-${{ runner.os }}-${{ hashFiles('services/nutrition-api/tests/**', 'services/reco-engine/tests/**', 'services/nutrition-api/requirements.txt', 'services/reco-engine/requirements.txt') }}
          restore-keys: |
            pytest-${{ runner.os }}-

      - name: Run ETL unit tests under coverage
        run: PYTHONPATH=etl python -m coverage run --rcfile=.coveragerc -m unittest discover -s etl/tests -v

      - name: Run Django API tests under coverage
        working-directory: services/backend
        run: python -m coverage run --append --rcfile=../../.coveragerc manage.py test -v 2

      - name: Run nutrition-api tests under coverage
        working-directory: services/nutrition-api
        run: python -m coverage run --append --rcfile=../../.coveragerc --source=app -m pytest -v

      - name: Run reco-engine tests under coverage
        working-directory: services/reco-engine
        run: python -m coverage run --append --rcfile=../../.coveragerc --source=scoring,main,mongo,seed,llm,models -m pytest -v

      - name: Combined coverage report (fail if < 70%)
        run: python -m coverage report --rcfile=.coveragerc

      - name: Generate HTML + XML coverage
        if: always()
        run: |
          python -m coverage html --rcfile=.coveragerc
          python -m coverage xml --rcfile=.coveragerc -o coverage.xml

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            htmlcov/
            coverage.xml
          retention-days: 14

  etl-smoke:
    name: "2 · ETL pipeline + monitoring (smoke)"
    needs: [dependency-audit, python-sast, trivy-fs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ env.PIP_CACHE_PATHS }}

      - name: Install ETL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r etl/requirements.txt

      - name: Run ETL pipeline
        run: python etl/run_pipeline.py

      - name: Run monitoring (fail on WARNING / CRITICAL)
        run: python etl/run_monitoring.py --fail-on-warning

      - name: Verify etl_run tracking
        run: |
          python - <<'PY'
          import sqlite3
          con = sqlite3.connect("mspr_etl.db")
          rows = list(con.execute(
              "SELECT run_id, status, total_rows FROM etl_run "
              "ORDER BY run_id DESC LIMIT 1"
          ))
          assert rows, "etl_run is empty after pipeline run"
          run_id, status, total_rows = rows[0]
          print(f"Last run: id={run_id}, status={status}, total_rows={total_rows}")
          assert status in ("SUCCESS", "WARNING"), f"unexpected status {status}"
          assert total_rows > 0, "no rows loaded"
          PY

      - name: Upload ETL reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etl-reports
          path: |
            reports/
            mspr_etl.db
          retention-days: 14

  frontend-admin:
    name: "2 · Frontend-admin build (Node 22)"
    needs: [dependency-audit, python-sast, trivy-fs]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend-admin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/frontend-admin/package-lock.json
            apps/frontend-user/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-admin-dist
          path: apps/frontend-admin/dist/
          retention-days: 14

  frontend-user:
    name: "2 · Frontend-user (Node 22)"
    needs: [dependency-audit, python-sast, trivy-fs]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend-user
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/frontend-admin/package-lock.json
            apps/frontend-user/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test + coverage (Sonar lcov)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-user-dist
          path: apps/frontend-user/dist/
          retention-days: 14

      - name: Upload lcov for SonarQube
        uses: actions/upload-artifact@v4
        with:
          name: frontend-user-lcov
          path: apps/frontend-user/coverage/
          retention-days: 14
          if-no-files-found: error

  # ===========================================================================
  # Stage 3 — Docker image scan (after tests & builds pass)
  # ===========================================================================

  trivy-images-core:
    name: "3 · Trivy image — ${{ matrix.name }}"
    needs: [tests-coverage, etl-smoke, frontend-admin, frontend-user]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: etl
            context: .
            dockerfile: Dockerfile.etl
            tag: mspr-etl:ci
          - name: backend
            context: services/backend
            dockerfile: services/backend/Dockerfile
            tag: mspr-backend:ci
          - name: reco-engine
            context: services/reco-engine
            dockerfile: services/reco-engine/Dockerfile
            tag: mspr-reco-engine:ci
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/cache-trivy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (GHA cache)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: ${{ matrix.tag }}
          load: true
          push: false
          cache-from: type=gha,scope=mspr-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=mspr-${{ matrix.name }}

      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.tag }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Generate Trivy image SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          scan-type: image
          image-ref: ${{ matrix.tag }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-image-${{ matrix.name }}.sarif

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-${{ matrix.name }}.sarif
          category: trivy-image-${{ matrix.name }}

  # ===========================================================================
  # Stage 3b — Continuous Delivery: publish images to GHCR (main + app)
  # ===========================================================================

  publish-images:
    name: "3 · Publish image → GHCR (${{ matrix.name }})"
    needs: [trivy-images-core]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/app')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: etl
            context: .
            dockerfile: Dockerfile.etl
          - name: backend
            context: services/backend
            dockerfile: services/backend/Dockerfile
          - name: nutrition-api
            context: services/nutrition-api
            dockerfile: services/nutrition-api/Dockerfile
          - name: reco-engine
            context: services/reco-engine
            dockerfile: services/reco-engine/Dockerfile
          - name: frontend-admin
            context: apps/frontend-admin
            dockerfile: apps/frontend-admin/Dockerfile
          - name: frontend-user
            context: apps/frontend-user
            dockerfile: apps/frontend-user/Dockerfile
          - name: airflow
            context: orchestration/airflow
            dockerfile: orchestration/airflow/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image namespace
        id: ns
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.ns.outputs.owner }}/mspr-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mspr-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=mspr-${{ matrix.name }}

  # ===========================================================================
  # Stage 3c — SonarQube quality analysis (ephemeral local instance in CI)
  # ===========================================================================

  sonarqube-scan:
    name: "3 · SonarQube quality analysis"
    needs: [tests-coverage, frontend-user]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Increase vm.max_map_count for SonarQube
        run: sudo sysctl -w vm.max_map_count=262144

      - name: Start SonarQube container
        run: |
          docker run -d --name sonarqube \
            -p 9000:9000 \
            -e SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true \
            sonarqube:community

      - name: Bootstrap SonarQube token
        id: sonar
        run: |
          TOKEN=$(bash infra/scripts/sonar-ci-bootstrap.sh)
          echo "::add-mask::$TOKEN"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Download Python coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: coverage-artifacts

      - name: Prepare coverage reports for Sonar
        run: |
          if [ -f coverage-artifacts/coverage.xml ]; then
            cp coverage-artifacts/coverage.xml coverage.xml
          fi

      - name: Download frontend lcov (from frontend-user job)
        uses: actions/download-artifact@v4
        with:
          name: frontend-user-lcov
          path: apps/frontend-user/coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4.2.1
        env:
          SONAR_TOKEN: ${{ steps.sonar.outputs.token }}
          SONAR_HOST_URL: http://127.0.0.1:9000
          SONAR_SCANNER_OPTS: -Dsonar.qualitygate.wait=false

      - name: SonarQube dashboard link
        if: always()
        run: |
          echo "### SonarQube (job éphémère CI)" >> "$GITHUB_STEP_SUMMARY"
          echo "Analyse exécutée sur instance locale éphémère (non persistée)." >> "$GITHUB_STEP_SUMMARY"
          echo "Pour un rapport persistant : \`docker compose --profile sonar up -d\` puis \`./infra/scripts/sonar-scan.sh\`" >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # Stage 4 — Extended scans (weekly cron or manual trigger only)
  # ===========================================================================

  dependency-audit-ml:
    name: "4 · Dependency audit (nutrition-api / ML)"
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [trivy-images-core]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/nutrition-api/requirements.txt

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: pip-audit — nutrition-api
        run: pip-audit -r services/nutrition-api/requirements.txt

  trivy-images-full:
    name: "4 · Trivy image (full) — ${{ matrix.name }}"
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [trivy-images-core]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: nutrition-api
            context: services/nutrition-api
            dockerfile: services/nutrition-api/Dockerfile
            tag: mspr-nutrition-api:ci
          - name: frontend-admin
            context: apps/frontend-admin
            dockerfile: apps/frontend-admin/Dockerfile
            tag: mspr-frontend-admin:ci
          - name: frontend-user
            context: apps/frontend-user
            dockerfile: apps/frontend-user/Dockerfile
            tag: mspr-frontend-user:ci
          - name: airflow
            context: orchestration/airflow
            dockerfile: orchestration/airflow/Dockerfile
            tag: mspr-airflow:ci
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/cache-trivy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (GHA cache)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: ${{ matrix.tag }}
          load: true
          push: false
          cache-from: type=gha,scope=mspr-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=mspr-${{ matrix.name }}

      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.tag }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Generate Trivy image SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          scan-type: image
          image-ref: ${{ matrix.tag }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-image-${{ matrix.name }}.sarif

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-${{ matrix.name }}.sarif
          category: trivy-image-${{ matrix.name }}-full

  trivy-base-images:
    name: "4 · Trivy base image — ${{ matrix.image }}"
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [trivy-images-full]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [postgres:16, mongo:7]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/cache-trivy

      - name: Pull image
        run: docker pull "${{ matrix.image }}"

      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.image }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Generate Trivy base SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          scan-type: image
          image-ref: ${{ matrix.image }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-base-${{ strategy.job-index }}.sarif

      - name: Upload Trivy base SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-base-${{ strategy.job-index }}.sarif
          category: trivy-base-${{ matrix.image }}
