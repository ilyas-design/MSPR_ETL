name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly: ML dependency audit + full Docker image scans
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ===========================================================================
  # Stage 1 — Security gates (fast, fail early)
  # ===========================================================================

  dependency-audit:
    name: "1 · Dependency audit (pip + npm)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: pip-audit — ETL
        run: pip-audit -r requirements.txt

      - name: pip-audit — backend
        run: pip-audit -r backend/requirements.txt

      - name: pip-audit — reco-engine
        run: pip-audit -r reco-engine/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit — frontend
        working-directory: frontend
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high

      - name: npm audit — frontend-user
        working-directory: frontend-user
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high

  python-sast:
    name: "1 · Python SAST (Bandit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install "bandit[toml]"

      - name: Run Bandit
        run: |
          bandit -r Pipelines backend nutrition-api reco-engine airflow \
            -x '*/tests/*,*test*.py,*/migrations/*,*/.pytest_cache/*' \
            -lll \
            -f json -o bandit-report.json || true
          bandit -r Pipelines backend nutrition-api reco-engine airflow \
            -x '*/tests/*,*test*.py,*/migrations/*,*/.pytest_cache/*' \
            -lll

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14

  trivy-fs:
    name: "1 · Trivy filesystem scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
          skip-dirs: node_modules,htmlcov,.pytest_cache,airflow/logs,frontend/dist,frontend-user/dist,.git,graphify-out,nutrition-api
          skip-files: docker-compose.yml,.env.example

      - name: Upload Trivy FS SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-fs.sarif
          skip-dirs: node_modules,htmlcov,.pytest_cache,airflow/logs,frontend/dist,frontend-user/dist,.git,graphify-out,nutrition-api
          skip-files: docker-compose.yml,.env.example

      - name: Publish Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  # ===========================================================================
  # Stage 2 — Tests & builds (after security gates pass)
  # ===========================================================================

  tests-coverage:
    name: "2 · Tests & coverage (Python 3.12)"
    needs: [dependency-audit, python-sast, trivy-fs]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: healthai
          POSTGRES_PASSWORD: healthai
          POSTGRES_DB: healthai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-dummy-secret-key-insecure-do-not-use
      DEBUG: "True"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: healthai
      POSTGRES_USER: healthai
      POSTGRES_PASSWORD: healthai
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            backend/requirements.txt
            nutrition-api/requirements.txt
            reco-engine/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r backend/requirements.txt
          pip install -r nutrition-api/requirements.txt
          pip install -r reco-engine/requirements.txt
          pip install coverage

      - name: Run ETL unit tests under coverage
        run: python -m coverage run --rcfile=.coveragerc -m unittest discover -s tests -v

      - name: Run Django API tests under coverage
        working-directory: backend
        run: python -m coverage run --append --rcfile=../.coveragerc manage.py test -v 2

      - name: Run nutrition-api tests under coverage
        working-directory: nutrition-api
        run: python -m coverage run --append --rcfile=../.coveragerc --source=app -m pytest -v

      - name: Run reco-engine tests under coverage
        working-directory: reco-engine
        run: python -m coverage run --append --rcfile=../.coveragerc --source=scoring,main,mongo,seed,llm,models -m pytest -v

      - name: Combined coverage report (fail if < 70%)
        run: python -m coverage report --rcfile=.coveragerc

      - name: Generate HTML coverage
        if: always()
        run: python -m coverage html --rcfile=.coveragerc

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

  etl-smoke:
    name: "2 · ETL pipeline + monitoring (smoke)"
    needs: [dependency-audit, python-sast, trivy-fs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ETL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL pipeline
        run: python run_pipeline.py

      - name: Run monitoring (fail on WARNING / CRITICAL)
        run: python run_monitoring.py --fail-on-warning

      - name: Verify etl_run tracking
        run: |
          python - <<'PY'
          import sqlite3, sys
          con = sqlite3.connect("mspr_etl.db")
          rows = list(con.execute(
              "SELECT run_id, status, total_rows FROM etl_run "
              "ORDER BY run_id DESC LIMIT 1"
          ))
          assert rows, "etl_run is empty after pipeline run"
          run_id, status, total_rows = rows[0]
          print(f"Last run: id={run_id}, status={status}, total_rows={total_rows}")
          assert status in ("SUCCESS", "WARNING"), f"unexpected status {status}"
          assert total_rows > 0, "no rows loaded"
          PY

      - name: Upload ETL reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etl-reports
          path: |
            reports/
            mspr_etl.db
          retention-days: 14

  frontend-build:
    name: "2 · Frontend build (Node 22)"
    needs: [dependency-audit, python-sast, trivy-fs]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 14

  frontend-user:
    name: "2 · Frontend-user (Node 22)"
    needs: [dependency-audit, python-sast, trivy-fs]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-user
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-user/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-user-dist
          path: frontend-user/dist/
          retention-days: 14

  # ===========================================================================
  # Stage 3 — Docker image scan (after tests & builds pass)
  # ===========================================================================

  trivy-images-core:
    name: "3 · Trivy image — ${{ matrix.name }}"
    needs: [tests-coverage, etl-smoke, frontend-build, frontend-user]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: etl
            context: .
            dockerfile: Dockerfile.etl
            tag: mspr-etl:ci
          - name: backend
            context: backend
            dockerfile: backend/Dockerfile
            tag: mspr-backend:ci
          - name: reco-engine
            context: reco-engine
            dockerfile: reco-engine/Dockerfile
            tag: mspr-reco-engine:ci
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t "${{ matrix.tag }}" -f "${{ matrix.dockerfile }}" "${{ matrix.context }}"

      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.tag }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Generate Trivy image SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          scan-type: image
          image-ref: ${{ matrix.tag }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-image-${{ matrix.name }}.sarif

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-${{ matrix.name }}.sarif
          category: trivy-image-${{ matrix.name }}

  # ===========================================================================
  # Stage 4 — Extended scans (weekly cron or manual trigger only)
  # ===========================================================================

  dependency-audit-ml:
    name: "4 · Dependency audit (nutrition-api / ML)"
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [trivy-images-core]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: pip-audit — nutrition-api
        run: pip-audit -r nutrition-api/requirements.txt

  trivy-images-full:
    name: "4 · Trivy image (full) — ${{ matrix.name }}"
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [trivy-images-core]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: nutrition-api
            context: nutrition-api
            dockerfile: nutrition-api/Dockerfile
            tag: mspr-nutrition-api:ci
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            tag: mspr-frontend:ci
          - name: frontend-user
            context: frontend-user
            dockerfile: frontend-user/Dockerfile
            tag: mspr-frontend-user:ci
          - name: airflow
            context: airflow
            dockerfile: airflow/Dockerfile
            tag: mspr-airflow:ci
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t "${{ matrix.tag }}" -f "${{ matrix.dockerfile }}" "${{ matrix.context }}"

      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.tag }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Generate Trivy image SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          scan-type: image
          image-ref: ${{ matrix.tag }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-image-${{ matrix.name }}.sarif

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-${{ matrix.name }}.sarif
          category: trivy-image-${{ matrix.name }}-full

  trivy-base-images:
    name: "4 · Trivy base image — ${{ matrix.image }}"
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [trivy-images-full]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [postgres:16, mongo:7]
    steps:
      - name: Pull image
        run: docker pull "${{ matrix.image }}"

      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.image }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Generate Trivy base SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          scan-type: image
          image-ref: ${{ matrix.image }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-base-${{ strategy.job-index }}.sarif

      - name: Upload Trivy base SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-base-${{ strategy.job-index }}.sarif
          category: trivy-base-${{ matrix.image }}
